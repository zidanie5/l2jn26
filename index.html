<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listening Test</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f3f3f3;
      font-family: Arial, sans-serif;
    }
    button {
      font-size: 1.5rem;
      padding: 1rem 2rem;
      border: none;
      border-radius: 10px;
      background-color: #0078D7;
      color: white;
      cursor: pointer;
    }
    button:disabled {
      background-color: gray;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <button id="startBtn">Start</button>
  <audio id="audio" src="Track13SIL.mp3"></audio>

  <script>
    const button = document.getElementById('startBtn');
    const audio = document.getElementById('audio');

    button.addEventListener('click', () => {
      audio.play();
      button.disabled = true;
      button.textContent = "Playing...";
    });

    // Prevent pausing or skipping
    audio.addEventListener('pause', () => audio.play());
    audio.addEventListener('seeking', () => { audio.currentTime = 0; });

    // After playback ends
    audio.addEventListener('ended', () => {
      button.textContent = "Playback finished";
    });
  </script>
</body>
</html>
